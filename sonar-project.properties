# ==========================================
# Project Information
# ==========================================
sonar.projectKey=buildguard-backend
sonar.projectName=BuildGuard Backend
sonar.projectVersion=1.0

# ==========================================
# Source Configuration
# ==========================================
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.sourceEncoding=UTF-8
sonar.java.binaries=target/classes

# ==========================================
# Exclude Build Files
# ==========================================
sonar.exclusions=target/**,**/*.jar

# ==========================================
# Coverage (Optional)
# ==========================================
# sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# ==========================================
# SCM
# ==========================================
sonar.scm.provider=git

# ==========================================
# GitHub Links (Optional)
# ==========================================
sonar.links.homepage=https://github.com/allumadan/build-ai
sonar.links.scm=https://github.com/allumadan/build-ai
